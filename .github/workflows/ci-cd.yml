# ============================================================
# GitHub Actions CI/CD Pipeline for Ignition 8.3
# Runner: StagingRunner on 172.16.3.148 (label: self-hosted-staging)
#
# deploy-dev:     LOCAL copy  → C:\Program Files\...\projects\
# deploy-staging: NETWORK copy → \\172.16.3.120\C$\...\projects\
#
# REQUIREMENT before staging works:
#   Run ONCE on Staging server (172.16.3.120) as Administrator:
#   net share C$=C:\ /GRANT:Administrator,FULL
#   netsh advfirewall firewall set rule group="File and Printer Sharing" new enable=Yes
# ============================================================
name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - develop
      - release/*
  pull_request:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - both

env:
  BUILD_CONFIGURATION: Release

jobs:
  # ──────────────────────────────────────────────────────────
  # BUILD — GitHub cloud
  # ──────────────────────────────────────────────────────────
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects

      - name: Package All Projects
        run: |
          set -e
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  # ──────────────────────────────────────────────────────────
  # DEPLOY TO DEVELOPMENT (172.16.3.148)
  # StagingRunner on 172.16.3.148 copies files LOCALLY
  # ──────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted-staging   # ← StagingRunner on 172.16.3.148
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'dev' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Fix Ignition Permissions
        shell: powershell
        run: |
          icacls "C:\Program Files\Inductive Automation\Ignition\data" /grant "Administrator:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Permissions fixed!" -ForegroundColor Green

      - name: Deploy TestProject to Dev (LOCAL)
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject"

          Write-Host "=========================================="
          Write-Host " Deploying TestProject → Dev (local)"
          Write-Host " From: $src"
          Write-Host " To:   $dest"
          Write-Host "=========================================="

          if (-not (Test-Path $src)) {
            Write-Host "ERROR: Source not found!" -ForegroundColor Red
            Get-ChildItem "$PWD\artifacts\projects\" -ErrorAction SilentlyContinue
            exit 1
          }

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Dev!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          try {
            Invoke-WebRequest -Uri "http://localhost:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.DEV_GATEWAY_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered on Dev!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed: $($_.Exception.Message)" -ForegroundColor Yellow
            try {
              Invoke-WebRequest -Uri "http://localhost:8088/data/api/v1/restart-tasks/restart?confirm=true" `
                -Method POST `
                -Headers @{ "X-Ignition-API-Token" = "${{ secrets.DEV_GATEWAY_KEY }}" } `
                -UseBasicParsing -TimeoutSec 20 | Out-Null
              Write-Host "Gateway restart triggered!" -ForegroundColor Yellow
            } catch { Write-Host "Restart also failed" -ForegroundColor Yellow }
          }

      - name: Deploy FactoryDashboard to Dev (LOCAL)
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"

          if (-not (Test-Path $src)) {
            Write-Host "FactoryDashboard not found - skipping" -ForegroundColor Yellow
            exit 0
          }

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Dev!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          try {
            Invoke-WebRequest -Uri "http://localhost:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.DEV_GATEWAY_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed" -ForegroundColor Yellow
          }

      - name: Verify Dev Deployment
        shell: powershell
        run: |
          $base = "C:\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Dev Deployment Verification" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              Write-Host "[OK] $_ deployed to Dev" -ForegroundColor Green
            } else {
              Write-Host "[FAIL] $_ missing on Dev" -ForegroundColor Red
            }
          }
          Write-Host "Dev URL: http://172.16.3.148:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan

  # ──────────────────────────────────────────────────────────
  # DEPLOY TO STAGING (172.16.3.120)
  # StagingRunner on 172.16.3.148 copies via NETWORK to 172.16.3.120
  # ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted-staging   # ← same StagingRunner on 172.16.3.148
    needs: [build, test-pylib]
    if: |
      (startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'staging' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Check network access to Staging (172.16.3.120)
        shell: powershell
        run: |
          Write-Host "Checking network access to 172.16.3.120..."
          if (Test-Path "\\172.16.3.120\C$") {
            Write-Host "[OK] Staging server reachable!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] Cannot reach \\172.16.3.120\C$" -ForegroundColor Red
            Write-Host ""
            Write-Host "Run this on Staging server (172.16.3.120) as Administrator:" -ForegroundColor Yellow
            Write-Host "  net share C$=C:\ /GRANT:Administrator,FULL" -ForegroundColor White
            Write-Host "  netsh advfirewall firewall set rule group='File and Printer Sharing' new enable=Yes" -ForegroundColor White
            exit 1
          }

      - name: Deploy TestProject to Staging (NETWORK)
        shell: powershell
        run: |
          $stagingIP = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "\\$stagingIP\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject"

          Write-Host "Deploying TestProject → Staging ($stagingIP) via network..."

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Staging!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          try {
            Invoke-WebRequest -Uri "http://${stagingIP}:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.STAGE_GATEWAY_API_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered on Staging!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed: $($_.Exception.Message)" -ForegroundColor Yellow
          }

      - name: Deploy FactoryDashboard to Staging (NETWORK)
        shell: powershell
        run: |
          $stagingIP = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "\\$stagingIP\C$\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"

          if (-not (Test-Path $src)) {
            Write-Host "FactoryDashboard not found - skipping" -ForegroundColor Yellow
            exit 0
          }

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Staging!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          try {
            Invoke-WebRequest -Uri "http://${stagingIP}:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.STAGE_GATEWAY_API_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed" -ForegroundColor Yellow
          }

      - name: Verify Staging Deployment
        shell: powershell
        run: |
          $stagingIP = "172.16.3.120"
          $base = "\\$stagingIP\C$\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Staging Deployment Verification" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              Write-Host "[OK] $_ deployed to Staging" -ForegroundColor Green
            } else {
              Write-Host "[FAIL] $_ missing on Staging" -ForegroundColor Red
            }
          }
          Write-Host "Staging URL: http://${stagingIP}:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan
