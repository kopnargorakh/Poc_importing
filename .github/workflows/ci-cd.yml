# GitHub Actions CI/CD Pipeline for Ignition 8.3
# Development only deployment
name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - develop
      - release/*
  pull_request:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      deploy_type:
        description: 'Deploy type'
        required: true
        default: 'project'
        type: choice
        options:
          - project
          - gateway
      target_env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects
      - name: Package All Projects
        run: |
          set -e
          echo "Packaging all Ignition projects..."
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "No projects found, creating marker file..."
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  # ─────────────────────────────────────────────────────────────
  # DEVELOPMENT
  # Secret names kept EXACTLY as original:
  #   DEV_GATEWAY_URL
  #   DEV_GATEWAY_API_KEY
  #   DEV_GATEWAY_PASS
  # ─────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'dev')
    environment:
      name: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: .

      # ── TestProject — UNCHANGED ────────────────────────────────
      - name: Deploy to Development Gateway
        run: |
          echo "Packaging TestProject..."
          cd projects
          zip -r /tmp/TestProject.zip TestProject/
          cd -

          echo "Uploading TestProject..."
          UPLOAD=$(curl -s -o /tmp/tp_resp.txt -w "%{http_code}" \
            -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.DEV_GATEWAY_API_KEY }}" \
            -F "file=@/tmp/TestProject.zip" \
            "${{ secrets.DEV_GATEWAY_URL }}/data/api/v1/projects/import" \
            --max-time 60 || echo "000")
          echo "Upload: HTTP $UPLOAD"
          cat /tmp/tp_resp.txt || true

          echo "Triggering config scan..."
          curl -s -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.DEV_GATEWAY_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.DEV_GATEWAY_URL }}/data/api/v1/config/scan" \
            --max-time 15 || true
          echo "TestProject deployed!"

      # ── Resolve deploy type ────────────────────────────────────
      - name: Resolve Deploy Type
        run: |
          DEPLOY_TYPE="${{ github.event.inputs.deploy_type }}"
          if [ -z "$DEPLOY_TYPE" ]; then DEPLOY_TYPE="project"; fi
          echo "DEPLOY_TYPE=$DEPLOY_TYPE" >> $GITHUB_ENV
          echo "Deploy type: $DEPLOY_TYPE"

      # ── FactoryDashboard project deploy ────────────────────────
      - name: Deploy FactoryDashboard to Development (project)
        if: env.DEPLOY_TYPE == 'project'
        run: |
          echo "Packaging FactoryDashboard..."
          cd projects
          zip -r /tmp/FactoryDashboard.zip FactoryDashboard/
          cd -

          echo "Uploading FactoryDashboard..."
          UPLOAD=$(curl -s -o /tmp/fd_resp.txt -w "%{http_code}" \
            -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.DEV_GATEWAY_API_KEY }}" \
            -F "file=@/tmp/FactoryDashboard.zip" \
            "${{ secrets.DEV_GATEWAY_URL }}/data/api/v1/projects/import" \
            --max-time 60 || echo "000")
          echo "Upload: HTTP $UPLOAD"
          cat /tmp/fd_resp.txt || true

          SCAN=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.DEV_GATEWAY_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.DEV_GATEWAY_URL }}/data/api/v1/config/scan" \
            --max-time 15 || echo "000")
          echo "Config scan: HTTP $SCAN"

          if [[ "$SCAN" =~ ^2 ]]; then
            echo "FactoryDashboard is LIVE on Dev!"
          else
            curl -s -X POST \
              -H "X-Ignition-API-Token: ${{ secrets.DEV_GATEWAY_API_KEY }}" \
              "${{ secrets.DEV_GATEWAY_URL }}/data/api/v1/restart-tasks/restart?confirm=true" \
              --max-time 20 || true
            echo "Restart triggered — live in ~60 seconds"
          fi

      # ── FactoryDashboard gateway deploy ────────────────────────
      - name: Deploy FactoryDashboard to Development (gateway)
        if: env.DEPLOY_TYPE == 'gateway'
        run: |
          cd projects
          zip -r /tmp/FactoryDashboard.zip FactoryDashboard/
          cd -

          curl -s -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.DEV_GATEWAY_API_KEY }}" \
            -F "file=@/tmp/FactoryDashboard.zip" \
            "${{ secrets.DEV_GATEWAY_URL }}/data/api/v1/projects/import" \
            --max-time 60 || true

          curl -s -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.DEV_GATEWAY_API_KEY }}" \
            "${{ secrets.DEV_GATEWAY_URL }}/data/api/v1/restart-tasks/restart?confirm=true" \
            --max-time 20 || true
          echo "Gateway restart triggered — live in ~60 seconds"

  # ─────────────────────────────────────────────────────────────
  # STAGING
  # Secret names kept EXACTLY as original:
  #   STAGE_GATEWAY_URL
  #   STAGE_GATEWAY_API_KEY
  #   STAGE_GATEWAY_PASS
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy FactoryDashboard to Staging
    runs-on: ubuntu-latest
    needs: [build, test-pylib]
    if: |
      (startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'staging')
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: .

      - name: Resolve Deploy Type
        run: |
          DEPLOY_TYPE="${{ github.event.inputs.deploy_type }}"
          if [ -z "$DEPLOY_TYPE" ]; then DEPLOY_TYPE="project"; fi
          echo "DEPLOY_TYPE=$DEPLOY_TYPE" >> $GITHUB_ENV

      # ── FactoryDashboard project deploy ────────────────────────
      - name: Deploy FactoryDashboard to Staging (project)
        if: env.DEPLOY_TYPE == 'project'
        run: |
          cd projects
          zip -r /tmp/FactoryDashboard.zip FactoryDashboard/
          cd -

          UPLOAD=$(curl -s -o /tmp/stage_resp.txt -w "%{http_code}" \
            -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.STAGE_GATEWAY_API_KEY }}" \
            -F "file=@/tmp/FactoryDashboard.zip" \
            "${{ secrets.STAGE_GATEWAY_URL }}/data/api/v1/projects/import" \
            --max-time 60 || echo "000")
          echo "Upload: HTTP $UPLOAD"
          cat /tmp/stage_resp.txt || true

          SCAN=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.STAGE_GATEWAY_API_KEY }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.STAGE_GATEWAY_URL }}/data/api/v1/config/scan" \
            --max-time 15 || echo "000")
          echo "Config scan: HTTP $SCAN"

          if [[ "$SCAN" =~ ^2 ]]; then
            echo "FactoryDashboard is LIVE on Staging!"
          else
            curl -s -X POST \
              -H "X-Ignition-API-Token: ${{ secrets.STAGE_GATEWAY_API_KEY }}" \
              "${{ secrets.STAGE_GATEWAY_URL }}/data/api/v1/restart-tasks/restart?confirm=true" \
              --max-time 20 || true
            echo "Restart triggered on staging"
          fi

      # ── FactoryDashboard gateway deploy ────────────────────────
      - name: Deploy FactoryDashboard to Staging (gateway)
        if: env.DEPLOY_TYPE == 'gateway'
        run: |
          cd projects
          zip -r /tmp/FactoryDashboard.zip FactoryDashboard/
          cd -

          curl -s -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.STAGE_GATEWAY_API_KEY }}" \
            -F "file=@/tmp/FactoryDashboard.zip" \
            "${{ secrets.STAGE_GATEWAY_URL }}/data/api/v1/projects/import" \
            --max-time 60 || true

          curl -s -X POST \
            -H "X-Ignition-API-Token: ${{ secrets.STAGE_GATEWAY_API_KEY }}" \
            "${{ secrets.STAGE_GATEWAY_URL }}/data/api/v1/restart-tasks/restart?confirm=true" \
            --max-time 20 || true
          echo "Gateway restart triggered on staging"
