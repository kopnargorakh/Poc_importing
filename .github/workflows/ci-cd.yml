name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - staging
          - both

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects
      - name: Package All Projects
        run: |
          set -e
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'dev' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Fix Ignition Permissions
        shell: powershell
        run: |
          icacls "C:\Program Files\Inductive Automation\Ignition\data" /grant "Administrator:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Permissions fixed!"

      - name: Deploy TestProject to Dev
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject to Dev..."
          if (-not (Test-Path $src)) {
            Write-Host "ERROR: Source not found!"
            Get-ChildItem "$PWD\artifacts\projects\" -ErrorAction SilentlyContinue
            exit 1
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Dev!"
          } else {
            Write-Host "[FAIL] project.json missing!"
            exit 1
          }

      - name: Deploy FactoryDashboard to Dev
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) {
            Write-Host "Skipping FactoryDashboard"
            exit 0
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Dev!"
          } else {
            Write-Host "[FAIL] project.json missing!"
            exit 1
          }

      - name: Reload Ignition Dev
        shell: powershell
        run: |
          $ignPath = "C:\Program Files\Inductive Automation\Ignition"
          $gwcmd   = "$ignPath\gwcmd.bat"

          Write-Host "Reloading Ignition Dev..."
          Write-Host "gwcmd path: $gwcmd"

          if (Test-Path $gwcmd) {
            Write-Host "gwcmd found - checking available options..."
            $help = & cmd /c """$gwcmd"" -h" 2>&1
            Write-Host "gwcmd help: $help"

            Write-Host "Trying gwcmd -r (reload)..."
            $r1 = & cmd /c """$gwcmd"" -r" 2>&1
            Write-Host "Result: $r1"
          }

          Write-Host "Touching project.json to trigger file watcher..."
          $projects = @("TestProject", "FactoryDashboard")
          foreach ($proj in $projects) {
            $p = "C:\Program Files\Inductive Automation\Ignition\data\projects\$proj\project.json"
            if (Test-Path $p) {
              $content = Get-Content $p -Raw
              Set-Content -Path $p -Value $content -NoNewline
              Write-Host "[OK] Touched $proj\project.json"
            }
          }
          Write-Host "Ignition will reload projects automatically!"

      - name: Verify Dev
        shell: powershell
        run: |
          $base = "C:\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "=========================================="
          Write-Host " Dev Deployment Complete!"
          Write-Host "=========================================="
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              $t = (Get-Item "$base\$_\project.json").LastWriteTime
              Write-Host "[OK] $_ deployed at $t"
            } else {
              Write-Host "[FAIL] $_ missing"
            }
          }
          Write-Host "Dev: http://172.16.3.148:8088/web/home"
          Write-Host "=========================================="

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'staging' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Check network to Staging
        shell: powershell
        run: |
          if (Test-Path "\\172.16.3.120\C$") {
            Write-Host "[OK] Staging reachable!"
          } else {
            Write-Host "[FAIL] Cannot reach \\172.16.3.120\C$"
            Write-Host "Run on 172.16.3.120: net share C$=C:\ /GRANT:Administrator,FULL"
            exit 1
          }

      - name: Deploy TestProject to Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject to Staging..."
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Staging!"
          } else {
            Write-Host "[FAIL] project.json missing!"
            exit 1
          }

      - name: Deploy FactoryDashboard to Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) {
            Write-Host "Skipping FactoryDashboard"
            exit 0
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Staging!"
          } else {
            Write-Host "[FAIL] project.json missing!"
            exit 1
          }

      - name: Reload Ignition Staging
        shell: powershell
        run: |
          $ip = "172.16.3.120"
          Write-Host "Touching project files on Staging to trigger reload..."
          $projects = @("TestProject", "FactoryDashboard")
          foreach ($proj in $projects) {
            $p = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\$proj\project.json"
            if (Test-Path $p) {
              $content = Get-Content $p -Raw
              Set-Content -Path $p -Value $content -NoNewline
              Write-Host "[OK] Touched $proj\project.json on Staging"
            }
          }
          Write-Host "Ignition Staging will reload projects automatically!"

      - name: Verify Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $base = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "=========================================="
          Write-Host " Staging Deployment Complete!"
          Write-Host "=========================================="
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              $t = (Get-Item "$base\$_\project.json").LastWriteTime
              Write-Host "[OK] $_ deployed at $t"
            } else {
              Write-Host "[FAIL] $_ missing"
            }
          }
          Write-Host "Staging: http://${ip}:8088/web/home"
          Write-Host "=========================================="
