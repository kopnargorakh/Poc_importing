# ============================================================
# GitHub Actions CI/CD Pipeline for Ignition 8.3
# Runner: StagingRunner on 172.16.3.148 (label: self-hosted-staging)
# push to develop deploys to BOTH Dev + Staging
# ============================================================
name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - staging
          - both

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects
      - name: Package All Projects
        run: |
          set -e
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'dev' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Fix Ignition Permissions
        shell: powershell
        run: |
          icacls "C:\Program Files\Inductive Automation\Ignition\data" /grant "Administrator:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Permissions fixed!" -ForegroundColor Green

      - name: Deploy TestProject to Dev
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject to Dev..."
          if (-not (Test-Path $src)) {
            Write-Host "ERROR: Source not found: $src" -ForegroundColor Red
            Get-ChildItem "$PWD\artifacts\projects\" -ErrorAction SilentlyContinue
            exit 1
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Dev!" -ForegroundColor Green
          } else { Write-Host "[FAIL] project.json missing!" -ForegroundColor Red; exit 1 }

      - name: Deploy FactoryDashboard to Dev
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) { Write-Host "Skipping FactoryDashboard" -ForegroundColor Yellow; exit 0 }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Dev!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }

      - name: Create WebDev reload script on Dev
        shell: powershell
        run: |
          $webdevPath = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject\com.inductiveautomation.webdev\endpoints\reload"
          New-Item -ItemType Directory -Force -Path $webdevPath | Out-Null
          $ts = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $json = '{"scope":"G","version":1,"restricted":false,"overridable":true,"files":["code.py"],"attributes":{"lastModification":{"actor":"cicd","timestamp":"' + $ts + '"}}}'
          Set-Content -Path "$webdevPath\resource.json" -Value $json -Encoding UTF8
          $py = "def doGet(request, session):`n    try:`n        system.project.requestScan()`n        return {'status': 'success', 'message': 'Reloaded'}`n    except Exception as e:`n        return {'status': 'error', 'message': str(e)}"
          Set-Content -Path "$webdevPath\code.py" -Value $py -Encoding UTF8
          Write-Host "[OK] WebDev reload script created on Dev!" -ForegroundColor Green

      - name: Wait and reload Dev
        shell: powershell
        run: |
          Write-Host "Waiting 15s for Ignition file watcher..."
          Start-Sleep -Seconds 15
          try {
            $r = Invoke-WebRequest "http://localhost:8088/system/webdev/TestProject/reload" -Method GET -UseBasicParsing -TimeoutSec 20
            Write-Host "[OK] Dev reloaded! $($r.Content)" -ForegroundColor Green
          } catch {
            Write-Host "WebDev: $($_.Exception.Message)" -ForegroundColor Yellow
          }

      - name: Verify Dev
        shell: powershell
        run: |
          $base = "C:\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Dev Deployment Complete!" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              $t = (Get-Item "$base\$_\project.json").LastWriteTime
              Write-Host "[OK] $_ at $t" -ForegroundColor Green
            } else { Write-Host "[FAIL] $_ missing" -ForegroundColor Red }
          }
          Write-Host "Dev: http://172.16.3.148:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'staging' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Check network to Staging
        shell: powershell
        run: |
          if (Test-Path "\\172.16.3.120\C$") {
            Write-Host "[OK] Staging reachable!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] Cannot reach \\172.16.3.120\C$" -ForegroundColor Red
            Write-Host "Run on 172.16.3.120: net share C$=C:\ /GRANT:Administrator,FULL" -ForegroundColor Yellow
            exit 1
          }

      - name: Deploy TestProject to Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject to Staging ($ip)..."
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Staging!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }

      - name: Deploy FactoryDashboard to Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) { Write-Host "Skipping FactoryDashboard" -ForegroundColor Yellow; exit 0 }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Staging!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }

      - name: Create WebDev reload script on Staging
        shell: powershell
        run: |
          $ip = "172.16.3.120"
          $webdevPath = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject\com.inductiveautomation.webdev\endpoints\reload"
          New-Item -ItemType Directory -Force -Path $webdevPath | Out-Null
          $ts = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $json = '{"scope":"G","version":1,"restricted":false,"overridable":true,"files":["code.py"],"attributes":{"lastModification":{"actor":"cicd","timestamp":"' + $ts + '"}}}'
          Set-Content -Path "$webdevPath\resource.json" -Value $json -Encoding UTF8
          $py = "def doGet(request, session):`n    try:`n        system.project.requestScan()`n        return {'status': 'success', 'message': 'Reloaded'}`n    except Exception as e:`n        return {'status': 'error', 'message': str(e)}"
          Set-Content -Path "$webdevPath\code.py" -Value $py -Encoding UTF8
          Write-Host "[OK] WebDev reload script created on Staging!" -ForegroundColor Green

      - name: Wait and reload Staging
        shell: powershell
        run: |
          $ip = "172.16.3.120"
          Write-Host "Waiting 15s for Ignition file watcher..."
          Start-Sleep -Seconds 15
          try {
            $r = Invoke-WebRequest "http://${ip}:8088/system/webdev/TestProject/reload" -Method GET -UseBasicParsing -TimeoutSec 20
            Write-Host "[OK] Staging reloaded! $($r.Content)" -ForegroundColor Green
          } catch {
            Write-Host "WebDev: $($_.Exception.Message)" -ForegroundColor Yellow
          }

      - name: Verify Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $base = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Staging Deployment Complete!" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              $t = (Get-Item "$base\$_\project.json").LastWriteTime
              Write-Host "[OK] $_ at $t" -ForegroundColor Green
            } else { Write-Host "[FAIL] $_ missing" -ForegroundColor Red }
          }
          Write-Host "Staging: http://${ip}:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan
