## GitHub Actions CI/CD Pipeline for Ignition 8.3
# Staging Pipeline — triggers on Stagging branch
name: Staging Pipeline

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - Stagging
  pull_request:
    branches:
      - Stagging
  workflow_dispatch:

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects

      - name: Package All Projects
        run: |
          set -e
          echo "Packaging all Ignition projects..."
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "No projects found, creating marker file..."
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  deploy-staging:
    name: Deploy to Staging
    runs-on: Stagging
    needs: [build, test-pylib]
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Debug Tags and Paths
        shell: powershell
        run: |
          Write-Host "=== CHECKING TAGS SOURCE IN ARTIFACTS ==="
          $tagsSource = '.\artifacts\projects\TestProject\ignition\tags\tags.json'
          Write-Host "tags.json exists in artifacts: $(Test-Path $tagsSource)"

          Write-Host ""
          Write-Host "=== CHECKING TAGS SOURCE IN PROJECTS ==="
          $tagsSourceDirect = '.\projects\TestProject\ignition\tags\tags.json'
          Write-Host "tags.json exists in projects: $(Test-Path $tagsSourceDirect)"

          Write-Host ""
          Write-Host "=== ARTIFACTS FOLDER FULL STRUCTURE ==="
          if (Test-Path '.\artifacts') {
            Get-ChildItem '.\artifacts' -Recurse | Select-Object FullName
          } else {
            Write-Host "artifacts folder NOT FOUND"
          }

          Write-Host ""
          Write-Host "=== PROJECTS FOLDER FULL STRUCTURE ==="
          if (Test-Path '.\projects') {
            Get-ChildItem '.\projects' -Recurse | Select-Object FullName
          } else {
            Write-Host "projects folder NOT FOUND"
          }

          Write-Host ""
          Write-Host "=== CHECKING TAGS ROOT ON SERVER ==="
          $tagsRoot = 'C:\Program Files\Inductive Automation\Ignition\data\config\core\ignition\tag-definition\default'
          Write-Host "tags_root folder exists: $(Test-Path $tagsRoot)"
          if (Test-Path $tagsRoot) {
            Write-Host "Current files in tags_root:"
            Get-ChildItem $tagsRoot
          } else {
            Write-Host "tags_root does NOT exist on server"
          }

          Write-Host ""
          Write-Host "=== CHECKING DEPLOY ROOT ON SERVER ==="
          $deployRoot = 'C:\Program Files\Inductive Automation\Ignition\data\projects'
          Write-Host "deploy_root exists: $(Test-Path $deployRoot)"
          if (Test-Path $deployRoot) {
            Write-Host "Projects on server:"
            Get-ChildItem $deployRoot
          }

      - name: Deploy to Staging Gateway
        shell: powershell
        env:
          STAGING_GATEWAY_URL:     ${{ secrets.STAGE_GATEWAY_URL }}
          STAGING_GATEWAY_API_KEY: ${{ secrets.STAGE_GATEWAY_API_KEY }}
          STAGING_GATEWAY_PASS:    ${{ secrets.STAGE_GATEWAY_PASS }}
          STAGING_GATEWAY_USER:    ${{ secrets.STAGGING_GATEWAY_USER }}
        run: |
          $env:STAGING_GATEWAY_URL     = "${{ secrets.STAGE_GATEWAY_URL }}"
          $env:STAGING_GATEWAY_API_KEY = "${{ secrets.STAGE_GATEWAY_API_KEY }}"
          $env:STAGING_GATEWAY_PASS    = "${{ secrets.STAGE_GATEWAY_PASS }}"
          $env:STAGING_GATEWAY_USER    = "${{ secrets.STAGGING_GATEWAY_USER }}"

          $projects = Get-ChildItem -Path '.\projects' -Directory
          if ($projects.Count -eq 0) {
            Write-Host "ERROR: No projects found"
            exit 1
          }

          foreach ($project in $projects) {
            $projectName = $project.Name
            Write-Host "Deploying $projectName to Staging"
            $bashCmd = "STAGING_GATEWAY_URL='$env:STAGING_GATEWAY_URL' STAGING_GATEWAY_API_KEY='$env:STAGING_GATEWAY_API_KEY' STAGING_GATEWAY_PASS='$env:STAGING_GATEWAY_PASS' STAGING_GATEWAY_USER='$env:STAGING_GATEWAY_USER' ./scripts/deploy-project.sh staging projects/$projectName"
            & 'C:\Program Files\Git\bin\bash.exe' -c $bashCmd
            Write-Host "DONE: $projectName deployed to Staging"
          }
