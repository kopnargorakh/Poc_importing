# GitHub Actions CI/CD Pipeline for Ignition 8.3
# ONE RUNNER on 172.16.3.148 (StagingRunner)
# Dev:     deploy locally via deploy-project.sh
# Staging: copy files via SCP + SSH to 172.16.3.120
name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - develop
      - release/*
  pull_request:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - both

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects
      - name: Package All Projects
        run: |
          set -e
          echo "Packaging all Ignition projects..."
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "No projects found, creating marker file..."
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'dev' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts
      - name: Fix Ignition Permissions
        shell: powershell
        run: |
          icacls "C:\Program Files\Inductive Automation\Ignition\data" /grant "Everyone:(OI)(CI)F" /T 2>$null | Out-Null
          icacls "C:\Program Files\Inductive Automation\Ignition\data\projects" /grant "Everyone:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Permissions fixed!"
      - name: Deploy to Development Gateway
        shell: powershell
        run: |
          $env:DEV_GATEWAY_URL     = "${{ secrets.DEV_GATEWAY_URL }}"
          $env:DEV_GATEWAY_API_KEY = "${{ secrets.DEV_GATEWAY_API_KEY }}"
          $env:DEV_GATEWAY_PASS    = "${{ secrets.DEV_GATEWAY_PASS }}"
          $env:DEV_GATEWAY_USER    = "${{ secrets.DEV_GATEWAY_USER }}"
          & "C:\Program Files\Git\bin\bash.exe" -c "DEV_GATEWAY_URL='$env:DEV_GATEWAY_URL' DEV_GATEWAY_API_KEY='$env:DEV_GATEWAY_API_KEY' DEV_GATEWAY_PASS='$env:DEV_GATEWAY_PASS' DEV_GATEWAY_USER='$env:DEV_GATEWAY_USER' ./scripts/deploy-project.sh dev projects/TestProject"
        env:
          DEV_GATEWAY_URL:     ${{ secrets.DEV_GATEWAY_URL }}
          DEV_GATEWAY_API_KEY: ${{ secrets.DEV_GATEWAY_API_KEY }}
          DEV_GATEWAY_PASS:    ${{ secrets.DEV_GATEWAY_PASS }}
          DEV_GATEWAY_USER:    ${{ secrets.DEV_GATEWAY_USER }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'staging' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Fix permissions on Staging via SSH
        shell: cmd
        run: |
          ssh -i "C:\actions-runner-staging\.ssh\id_rsa" -o StrictHostKeyChecking=no Administrator@172.16.3.120 "icacls \"C:\Program Files\Inductive Automation\Ignition\data\" /grant Everyone:(OI)(CI)F /T"
          echo Permissions fixed on Staging!

      - name: Remove old TestProject on Staging
        shell: cmd
        run: |
          ssh -i "C:\actions-runner-staging\.ssh\id_rsa" -o StrictHostKeyChecking=no Administrator@172.16.3.120 "if exist \"C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject\" rmdir /S /Q \"C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject\""
          echo Old TestProject removed!

      - name: Copy TestProject to Staging via SCP
        shell: cmd
        run: |
          scp -i "C:\actions-runner-staging\.ssh\id_rsa" -o StrictHostKeyChecking=no -r "artifacts\projects\TestProject" "Administrator@172.16.3.120:C:\Program Files\Inductive Automation\Ignition\data\projects\"
          echo TestProject copied to Staging!

      - name: Copy FactoryDashboard to Staging via SCP
        shell: cmd
        run: |
          if exist "artifacts\projects\FactoryDashboard" (
            ssh -i "C:\actions-runner-staging\.ssh\id_rsa" -o StrictHostKeyChecking=no Administrator@172.16.3.120 "if exist \"C:\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard\" rmdir /S /Q \"C:\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard\""
            scp -i "C:\actions-runner-staging\.ssh\id_rsa" -o StrictHostKeyChecking=no -r "artifacts\projects\FactoryDashboard" "Administrator@172.16.3.120:C:\Program Files\Inductive Automation\Ignition\data\projects\"
            echo FactoryDashboard copied to Staging!
          ) else (
            echo FactoryDashboard not found - skipping
          )

      - name: Verify Staging Deployment
        shell: cmd
        run: |
          ssh -i "C:\actions-runner-staging\.ssh\id_rsa" -o StrictHostKeyChecking=no Administrator@172.16.3.120 "if exist \"C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject\project.json\" (echo [OK] TestProject deployed!) else (echo [FAIL] TestProject missing!)"
          echo Staging URL: http://172.16.3.120:8088/web/home
