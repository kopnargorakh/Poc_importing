# GitHub Actions CI/CD Pipeline for Ignition 8.3
# Runner: StagingRunner (self-hosted-staging label) for BOTH environments
# Dev:     172.16.3.148 — copies via network share \\172.16.3.148\C$\...
# Staging: 172.16.3.120 — copies locally C:\...
name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging

env:
  BUILD_CONFIGURATION: Release

jobs:
  # ─────────────────────────────────────────────────────────────
  # BUILD — GitHub cloud
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects

      - name: Package All Projects
        run: |
          set -e
          echo "Packaging all Ignition projects..."
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "No projects found, creating marker file..."
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  # ─────────────────────────────────────────────────────────────
  # TEST
  # ─────────────────────────────────────────────────────────────
  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  # ─────────────────────────────────────────────────────────────
  # DEPLOY TO DEVELOPMENT (172.16.3.148)
  # Runner: StagingRunner on 172.16.3.120
  # Method: PowerShell Copy-Item via network share to dev server
  # ─────────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted-staging   # ← StagingRunner handles this
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'dev')
    environment:
      name: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Deploy TestProject to Dev (via network)
        shell: powershell
        run: |
          $devIP = "172.16.3.148"
          $src   = "$PWD\artifacts\projects\TestProject"
          $dest  = "\\$devIP\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject"

          Write-Host "=========================================="
          Write-Host " Deploying TestProject → Dev ($devIP)"
          Write-Host "=========================================="

          if (-not (Test-Path $src)) {
            Write-Host "ERROR: Source not found: $src" -ForegroundColor Red
            Get-ChildItem "$PWD\artifacts\projects\" -ErrorAction SilentlyContinue
            exit 1
          }

          if (Test-Path $dest) {
            Write-Host "Removing old TestProject..."
            Remove-Item -Recurse -Force $dest
          }

          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject copied to Dev!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          Write-Host "Triggering config scan on Dev..."
          try {
            Invoke-WebRequest -Uri "http://${devIP}:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.DEV_GATEWAY_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered on Dev!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed: $($_.Exception.Message)" -ForegroundColor Yellow
            try {
              Invoke-WebRequest -Uri "http://${devIP}:8088/data/api/v1/restart-tasks/restart?confirm=true" `
                -Method POST `
                -Headers @{ "X-Ignition-API-Token" = "${{ secrets.DEV_GATEWAY_KEY }}" } `
                -UseBasicParsing -TimeoutSec 20 | Out-Null
              Write-Host "Gateway restart triggered on Dev!" -ForegroundColor Yellow
            } catch { Write-Host "Restart also failed" -ForegroundColor Yellow }
          }

      - name: Deploy FactoryDashboard to Dev (via network)
        shell: powershell
        run: |
          $devIP = "172.16.3.148"
          $src   = "$PWD\artifacts\projects\FactoryDashboard"
          $dest  = "\\$devIP\C$\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"

          if (-not (Test-Path $src)) {
            Write-Host "FactoryDashboard not found - skipping" -ForegroundColor Yellow
            exit 0
          }

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard copied to Dev!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          try {
            Invoke-WebRequest -Uri "http://${devIP}:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.DEV_GATEWAY_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed: $($_.Exception.Message)" -ForegroundColor Yellow
          }

      - name: Verify Dev Deployment
        shell: powershell
        run: |
          $devIP = "172.16.3.148"
          $base  = "\\$devIP\C$\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Dev Deployment Verification" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              Write-Host "[OK] $_ deployed to Dev" -ForegroundColor Green
            } else {
              Write-Host "[FAIL] $_ missing on Dev!" -ForegroundColor Red
            }
          }
          Write-Host "Dev URL: http://${devIP}:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan

  # ─────────────────────────────────────────────────────────────
  # DEPLOY TO STAGING (172.16.3.120)
  # Runner: StagingRunner on 172.16.3.120
  # Method: PowerShell Copy-Item locally — fastest, most reliable
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted-staging   # ← same StagingRunner handles this
    needs: [deploy-dev]            # ← waits for dev to complete first
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target_env == 'staging')
    environment:
      name: staging                # ← approval popup comes from here

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Fix Ignition Permissions
        shell: powershell
        run: |
          $path = "C:\Program Files\Inductive Automation\Ignition\data"
          icacls $path /grant "Administrator:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Permissions OK" -ForegroundColor Green

      - name: Deploy TestProject to Staging (local)
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject"

          Write-Host "=========================================="
          Write-Host " Deploying TestProject → Staging (local)"
          Write-Host "=========================================="

          if (-not (Test-Path $src)) {
            Write-Host "ERROR: Source not found!" -ForegroundColor Red
            exit 1
          }

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Staging!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          try {
            Invoke-WebRequest -Uri "http://localhost:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.STAGE_GATEWAY_API_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered on Staging!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed: $($_.Exception.Message)" -ForegroundColor Yellow
            try {
              Invoke-WebRequest -Uri "http://localhost:8088/data/api/v1/restart-tasks/restart?confirm=true" `
                -Method POST `
                -Headers @{ "X-Ignition-API-Token" = "${{ secrets.STAGE_GATEWAY_API_KEY }}" } `
                -UseBasicParsing -TimeoutSec 20 | Out-Null
              Write-Host "Gateway restart triggered!" -ForegroundColor Yellow
            } catch { Write-Host "Restart also failed" -ForegroundColor Yellow }
          }
        env:
          STAGE_GATEWAY_API_KEY: ${{ secrets.STAGE_GATEWAY_API_KEY }}

      - name: Deploy FactoryDashboard to Staging (local)
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"

          if (-not (Test-Path $src)) {
            Write-Host "FactoryDashboard not found - skipping" -ForegroundColor Yellow
            exit 0
          }

          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force

          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Staging!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] project.json missing!" -ForegroundColor Red
            exit 1
          }

          try {
            Invoke-WebRequest -Uri "http://localhost:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.STAGE_GATEWAY_API_KEY }}"; "Content-Type" = "application/json" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered!" -ForegroundColor Green
          } catch {
            Write-Host "Scan failed" -ForegroundColor Yellow
          }
        env:
          STAGE_GATEWAY_API_KEY: ${{ secrets.STAGE_GATEWAY_API_KEY }}

      - name: Verify Staging Deployment
        shell: powershell
        run: |
          $base = "C:\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Staging Deployment Verification" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              Write-Host "[OK] $_ deployed to Staging" -ForegroundColor Green
            } else {
              Write-Host "[FAIL] $_ missing on Staging!" -ForegroundColor Red
            }
          }
          Write-Host "Staging URL: http://172.16.3.120:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan
