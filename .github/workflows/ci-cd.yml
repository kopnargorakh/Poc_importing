# GitHub Actions CI/CD Pipeline for Ignition 8.3
# ONE RUNNER — StagingRunner on 172.16.3.148
# Dev:     copies locally
# Staging: copies via network using credentials
name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - develop
      - release/*
  pull_request:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - both

env:
  BUILD_CONFIGURATION: Release

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects
      - name: Package All Projects
        run: |
          set -e
          echo "Packaging all Ignition projects..."
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "No projects found, creating marker file..."
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  # ─────────────────────────────────────────────────────────
  # DEVELOPMENT — copies locally on 172.16.3.148
  # ─────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'dev' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Fix Ignition Permissions on Dev
        shell: powershell
        run: |
          icacls "C:\Program Files\Inductive Automation\Ignition\data" /grant "Everyone:(OI)(CI)F" /T 2>$null | Out-Null
          icacls "C:\Program Files\Inductive Automation\Ignition\data\projects" /grant "Everyone:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Dev permissions fixed!"

      - name: Deploy to Development Gateway
        shell: powershell
        run: |
          $env:DEV_GATEWAY_URL     = "${{ secrets.DEV_GATEWAY_URL }}"
          $env:DEV_GATEWAY_API_KEY = "${{ secrets.DEV_GATEWAY_API_KEY }}"
          $env:DEV_GATEWAY_PASS    = "${{ secrets.DEV_GATEWAY_PASS }}"
          $env:DEV_GATEWAY_USER    = "${{ secrets.DEV_GATEWAY_USER }}"
          & "C:\Program Files\Git\bin\bash.exe" -c "DEV_GATEWAY_URL='$env:DEV_GATEWAY_URL' DEV_GATEWAY_API_KEY='$env:DEV_GATEWAY_API_KEY' DEV_GATEWAY_PASS='$env:DEV_GATEWAY_PASS' DEV_GATEWAY_USER='$env:DEV_GATEWAY_USER' ./scripts/deploy-project.sh dev projects/TestProject"
        env:
          DEV_GATEWAY_URL:     ${{ secrets.DEV_GATEWAY_URL }}
          DEV_GATEWAY_API_KEY: ${{ secrets.DEV_GATEWAY_API_KEY }}
          DEV_GATEWAY_PASS:    ${{ secrets.DEV_GATEWAY_PASS }}
          DEV_GATEWAY_USER:    ${{ secrets.DEV_GATEWAY_USER }}

  # ─────────────────────────────────────────────────────────
  # STAGING — copies via network to 172.16.3.120
  # Uses net use with credentials to authenticate
  # Secrets needed:
  #   STAGE_SERVER_USER ← Administrator
  #   STAGE_SERVER_PASS ← password of 172.16.3.120
  # ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (startsWith(github.ref, 'refs/heads/release/') && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'staging' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Connect to Staging server
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $user = "${{ secrets.STAGE_SERVER_USER }}"
          $pass = "${{ secrets.STAGE_SERVER_PASS }}"
          Write-Host "Connecting to staging server $ip..."
          net use "\\$ip\C$" $pass /user:$user /persistent:no
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Connected to staging server!"
          } else {
            Write-Host "[FAIL] Cannot connect to staging server!"
            exit 1
          }

      - name: Fix Ignition Permissions on Staging
        shell: powershell
        run: |
          $ip = "172.16.3.120"
          icacls "\\$ip\C$\Program Files\Inductive Automation\Ignition\data" /grant "Everyone:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Staging permissions fixed!"

      - name: Deploy to Staging Gateway
        shell: powershell
        run: |
          $ip  = "172.16.3.120"
          $src = "$PWD\artifacts\projects\TestProject"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject to Staging ($ip)..."
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Staging!"
          } else {
            Write-Host "[FAIL] Deployment failed!"
            exit 1
          }

      - name: Deploy FactoryDashboard to Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) { Write-Host "Skipping FactoryDashboard"; exit 0 }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Staging!"
          } else {
            Write-Host "[FAIL]"; exit 1
          }

      - name: Disconnect from Staging
        shell: powershell
        if: always()
        run: |
          net use "\\172.16.3.120\C$" /delete /yes 2>$null | Out-Null
          Write-Host "Disconnected from staging server"
