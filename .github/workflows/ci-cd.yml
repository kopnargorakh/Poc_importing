# ============================================================
# GitHub Actions CI/CD Pipeline for Ignition 8.3
# Runner: StagingRunner on 172.16.3.148 (label: self-hosted-staging)
#
# LIVE RELOAD using gwcmd - built into every Ignition install
# NO restart needed, NO API license needed
# gwcmd is at: C:\Program Files\Inductive Automation\Ignition\gwcmd.bat
# ============================================================
name: CI/CD Pipeline
permissions:
  contents: read
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

  workflow_dispatch:
    inputs:
      target_env:
        description: 'Target environment'
        required: true
        default: 'both'
        type: choice
        options:
          - dev
          - staging
          - both

env:
  BUILD_CONFIGURATION: Release
  IGNITION_PATH: "C:\\Program Files\\Inductive Automation\\Ignition"

jobs:
  build:
    name: Build and Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate Project Names and Structure
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects
      - name: Package All Projects
        run: |
          set -e
          mkdir -p build/
          if [ ! -d "projects" ] || [ -z "$(ls -A projects 2>/dev/null)" ]; then
            echo "no-projects" > build/.no-projects
          else
            chmod +x ./scripts/package-project.sh
            for dir in projects/*/; do
              if [ -d "$dir" ]; then
                echo "Packaging $(basename $dir)..."
                ./scripts/package-project.sh "$dir"
              fi
            done
          fi
          ls -lh build/
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  test-pylib:
    name: Test Python Libraries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run pylib tests
        run: |
          chmod +x ./scripts/test-pylib.sh
          ./scripts/test-pylib.sh pylib/Mustry/Tests

  # ──────────────────────────────────────────────────────────
  # DEPLOY TO DEVELOPMENT (172.16.3.148)
  # ──────────────────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Development
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'dev' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Fix Ignition Permissions
        shell: powershell
        run: |
          icacls "C:\Program Files\Inductive Automation\Ignition\data" /grant "Administrator:(OI)(CI)F" /T 2>$null | Out-Null
          Write-Host "Permissions fixed!" -ForegroundColor Green

      - name: Deploy TestProject to Dev
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject to Dev..."
          if (-not (Test-Path $src)) {
            Write-Host "ERROR: Source not found!" -ForegroundColor Red
            Get-ChildItem "$PWD\artifacts\projects\" -ErrorAction SilentlyContinue
            exit 1
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }

      - name: Deploy FactoryDashboard to Dev
        shell: powershell
        run: |
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "C:\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) { Write-Host "Skipping FactoryDashboard" -ForegroundColor Yellow; exit 0 }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }

      # ── Live reload using gwcmd ────────────────────────────
      - name: Reload Ignition Dev (gwcmd - no restart needed)
        shell: powershell
        run: |
          $gwcmd = "C:\Program Files\Inductive Automation\Ignition\gwcmd.bat"

          Write-Host "Reloading Ignition Dev using gwcmd..."

          if (Test-Path $gwcmd) {
            # Try gwcmd project scan
            try {
              $result = & cmd /c "`"$gwcmd`" --project-scan" 2>&1
              Write-Host "gwcmd result: $result" -ForegroundColor Green
              Write-Host "[OK] Projects reloaded via gwcmd!" -ForegroundColor Green
            } catch {
              Write-Host "gwcmd failed: $($_.Exception.Message)" -ForegroundColor Yellow
            }
          } else {
            Write-Host "gwcmd not found at: $gwcmd" -ForegroundColor Yellow

            # Fallback: touch project.json to trigger file watcher
            Write-Host "Using file touch fallback..."
            $projectJson = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject\project.json"
            if (Test-Path $projectJson) {
              (Get-Item $projectJson).LastWriteTime = Get-Date
              Write-Host "[OK] project.json touched — Ignition file watcher will detect change" -ForegroundColor Green
            }
          }

      - name: Verify Dev
        shell: powershell
        run: |
          $base = "C:\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Dev Deployment Complete!" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              $t = (Get-Item "$base\$_\project.json").LastWriteTime
              Write-Host "[OK] $_ deployed at $t" -ForegroundColor Green
            } else { Write-Host "[FAIL] $_ missing" -ForegroundColor Red }
          }
          Write-Host "Dev: http://172.16.3.148:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan

  # ──────────────────────────────────────────────────────────
  # DEPLOY TO STAGING (172.16.3.120)
  # ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted-staging
    needs: [build, test-pylib]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.target_env == 'staging' ||
        github.event.inputs.target_env == 'both'
      ))
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.sha }}
          path: ./artifacts

      - name: Check network to Staging
        shell: powershell
        run: |
          if (Test-Path "\\172.16.3.120\C$") {
            Write-Host "[OK] Staging reachable!" -ForegroundColor Green
          } else {
            Write-Host "[FAIL] Cannot reach \\172.16.3.120\C$" -ForegroundColor Red
            Write-Host "Run on 172.16.3.120: net share C$=C:\ /GRANT:Administrator,FULL" -ForegroundColor Yellow
            exit 1
          }

      - name: Deploy TestProject to Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject to Staging..."
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed to Staging!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }

      - name: Deploy FactoryDashboard to Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) { Write-Host "Skipping FactoryDashboard" -ForegroundColor Yellow; exit 0 }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed to Staging!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }

      # ── Live reload on Staging using gwcmd via network ─────
      - name: Reload Ignition Staging (gwcmd via PSSession)
        shell: powershell
        run: |
          $ip    = "172.16.3.120"
          $gwcmd = "C:\Program Files\Inductive Automation\Ignition\gwcmd.bat"

          Write-Host "Reloading Ignition Staging using gwcmd..."

          # Try remote execution via PowerShell session
          try {
            $session = New-PSSession -ComputerName $ip -ErrorAction Stop
            $result = Invoke-Command -Session $session -ScriptBlock {
              $gwcmd = "C:\Program Files\Inductive Automation\Ignition\gwcmd.bat"
              if (Test-Path $gwcmd) {
                & cmd /c "`"$gwcmd`" --project-scan" 2>&1
              } else {
                # Fallback: touch project.json
                $p = "C:\Program Files\Inductive Automation\Ignition\data\projects\TestProject\project.json"
                if (Test-Path $p) { (Get-Item $p).LastWriteTime = Get-Date }
                "File touch fallback done"
              }
            }
            Remove-PSSession $session
            Write-Host "[OK] Staging reloaded: $result" -ForegroundColor Green
          } catch {
            Write-Host "Remote session failed: $($_.Exception.Message)" -ForegroundColor Yellow

            # Fallback: touch project.json via network share
            Write-Host "Using network file touch fallback..."
            $projectJson = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject\project.json"
            if (Test-Path $projectJson) {
              (Get-Item $projectJson).LastWriteTime = Get-Date
              Write-Host "[OK] project.json touched on Staging — file watcher will detect" -ForegroundColor Green
            }
          }

      - name: Verify Staging
        shell: powershell
        run: |
          $ip   = "172.16.3.120"
          $base = "\\$ip\C$\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Staging Deployment Complete!" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              $t = (Get-Item "$base\$_\project.json").LastWriteTime
              Write-Host "[OK] $_ deployed at $t" -ForegroundColor Green
            } else { Write-Host "[FAIL] $_ missing" -ForegroundColor Red }
          }
          Write-Host "Staging: http://${ip}:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan
