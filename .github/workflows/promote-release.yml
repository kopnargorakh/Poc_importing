# ============================================================
# Promote Release Workflow
# Uses DevRunner on 172.16.3.148
# Deploys release branch to Staging (172.16.3.120) via network
# ============================================================
name: Promote Release

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: 'Release branch (e.g. release/1.0.0)'
        required: true
        type: string
      release_version:
        description: 'Version number (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release Branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate branch exists
        run: |
          BRANCH="${{ github.event.inputs.release_branch }}"
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            echo "Branch $BRANCH exists!"
          else
            echo "ERROR: Branch $BRANCH does not exist!"
            exit 1
          fi
      - name: Show release info
        run: |
          echo "=========================================="
          echo " Release: ${{ github.event.inputs.release_version }}"
          echo " Branch:  ${{ github.event.inputs.release_branch }}"
          echo " Target:  Staging (172.16.3.120)"
          echo "=========================================="

  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_branch }}
      - name: Validate Project Names
        run: |
          chmod +x ./scripts/validate-names.sh
          ./scripts/validate-names.sh ./projects
      - name: Package All Projects
        run: |
          set -e
          mkdir -p build/
          chmod +x ./scripts/package-project.sh
          for dir in projects/*/; do
            if [ -d "$dir" ]; then
              echo "Packaging $(basename $dir)..."
              ./scripts/package-project.sh "$dir"
            fi
          done
          ls -lh build/
      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.event.inputs.release_version }}
          if-no-files-found: error
          path: |
            build/
            scripts/
            config/
            projects/
            migrations/

  deploy-staging:
    name: Deploy Release to Staging
    runs-on: self-hosted
    needs: [build]
    environment:
      name: staging
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_branch }}
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts-${{ github.event.inputs.release_version }}
          path: ./artifacts

      - name: Deploy TestProject to Staging
        shell: powershell
        run: |
          $stagingIP = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\TestProject"
          $dest = "\\$stagingIP\C$\Program Files\Inductive Automation\Ignition\data\projects\TestProject"
          Write-Host "Deploying TestProject v${{ github.event.inputs.release_version }} to Staging..."
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] TestProject deployed!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }
          try {
            Invoke-WebRequest -Uri "http://${stagingIP}:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.STAGE_GATEWAY_API_KEY }}" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered!" -ForegroundColor Green
          } catch { Write-Host "Scan failed" -ForegroundColor Yellow }

      - name: Deploy FactoryDashboard to Staging
        shell: powershell
        run: |
          $stagingIP = "172.16.3.120"
          $src  = "$PWD\artifacts\projects\FactoryDashboard"
          $dest = "\\$stagingIP\C$\Program Files\Inductive Automation\Ignition\data\projects\FactoryDashboard"
          if (-not (Test-Path $src)) { Write-Host "Skipping FactoryDashboard"; exit 0 }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item -Path "$src\*" -Destination $dest -Recurse -Force
          if (Test-Path "$dest\project.json") {
            Write-Host "[OK] FactoryDashboard deployed!" -ForegroundColor Green
          } else { Write-Host "[FAIL]" -ForegroundColor Red; exit 1 }
          try {
            Invoke-WebRequest -Uri "http://${stagingIP}:8088/data/api/v1/config/scan" `
              -Method POST `
              -Headers @{ "X-Ignition-API-Token" = "${{ secrets.STAGE_GATEWAY_API_KEY }}" } `
              -UseBasicParsing -TimeoutSec 15 | Out-Null
            Write-Host "[OK] Config scan triggered!" -ForegroundColor Green
          } catch { Write-Host "Scan failed" -ForegroundColor Yellow }

      - name: Create release tag
        shell: powershell
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ github.event.inputs.release_version }}" -m "Release v${{ github.event.inputs.release_version }}"
          git push origin "v${{ github.event.inputs.release_version }}"
          Write-Host "Tag v${{ github.event.inputs.release_version }} created!" -ForegroundColor Green

      - name: Verify Staging
        shell: powershell
        run: |
          $stagingIP = "172.16.3.120"
          $base = "\\$stagingIP\C$\Program Files\Inductive Automation\Ignition\data\projects"
          Write-Host "==========================================" -ForegroundColor Cyan
          Write-Host " Release v${{ github.event.inputs.release_version }} on Staging" -ForegroundColor Cyan
          Write-Host "==========================================" -ForegroundColor Cyan
          @("TestProject","FactoryDashboard") | ForEach-Object {
            if (Test-Path "$base\$_\project.json") {
              Write-Host "[OK] $_ deployed" -ForegroundColor Green
            } else { Write-Host "[FAIL] $_ missing" -ForegroundColor Red }
          }
          Write-Host "Staging: http://${stagingIP}:8088/web/home"
          Write-Host "==========================================" -ForegroundColor Cyan
