database:
  host: localhost
  port: 5432
  name: ignition_staging
  username: ignition

projects:
  # List of projects to deploy (will be populated by CI/CD)
  # Format: project-name: path/to/project.zip

deployment:
  auto_backup: true
  backup_retention_days: 30
  require_approval: false
  pre_deploy_scripts:
    - db_migrate
    - smoke_test
  post_deploy_scripts:
    - integration_test
